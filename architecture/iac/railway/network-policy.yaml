# ─────────────────────────────────────────────────────────────────────
# Studio Zero — Runner Pool Egress Allowlist (Cilium NetworkPolicy)
#
# Closes: ARCH-D9 (egress allowlist enforcement primitive) per
#         `architecture/decisions.md` line 388 and the M1 exit-gate
#         row "ARCH-D9 closed" in `sprint/milestone-M1.md`.
#
# Owner:  Pipeline (this file) + Shield (sandbox primitives review) +
#         Cipher (egress destinations match LLM-gateway scope).
#         Terra wires the manifest into Railway's Kubernetes substrate.
#
# Threat coverage:
#   - TB-4 (Runner → Anthropic / LLM provider)   — threat-model.md §TB-4
#   - TB-6 (Runner → customer-deployed URL SSRF) — threat-model.md §TB-6
#   - TB-14 (Runner → Sentry / PostHog telemetry exfil)
#   - §3.1 SSRF cross-cutting (deny-all-default closes the rebinding
#     loophole that an app-layer filter alone cannot fully guarantee).
#
# Layering (defense in depth):
#   Layer 1 — App-layer URL filter in `apps/runner/src/ssrf-guard.ts`
#             (Forge-2 commit 43779fb). Rejects literal-IP / loopback /
#             rebinder / scheme abuse BEFORE socket() is called.
#   Layer 2 — THIS NetworkPolicy. Drops every egress that doesn't match
#             an entry below at the host network layer. Even if the
#             runner is compromised and bypasses the URL filter, the
#             kernel-level Cilium drop-policy still wins.
#   Layer 3 — Egress proxy (M1+1; specced in `egress-proxy.md` sibling
#             file). Re-validates resolved IP on every redirect hop.
#
# Validation:
#   - Cilium CiliumNetworkPolicy v2 schema (docs.cilium.io/en/stable/
#     network/kubernetes/ciliumnetworkpolicy/). Validate locally with:
#       cilium policy validate architecture/iac/railway/network-policy.yaml
#     (the cilium CLI is part of the standard Cilium dist; ships with
#     Railway's k8s substrate.)
#   - Integration test: `tests/security/egress-blocked.spec.ts`
#     (Verify; lands once Shield's spike confirms Railway exposes CRDs
#     to tenants — Sprint R13). Test attempts an egress to a non-allow-
#     listed host and asserts DENY.
#
# Important non-goals at M1:
#   - DOES NOT cover per-tenant rate limiting (proxy concern; see
#     `egress-proxy.md`).
#   - DOES NOT cover the customer-attested URL host (TB-6 dynamic
#     allow-add at job dispatch). That is handled by an app-layer
#     allowlist check + a per-run egress proxy ACL injection — out of
#     scope for the M1 NetworkPolicy (would require dynamic CRD edits
#     which Railway likely doesn't expose). The headless browser
#     pathway uses the egress proxy spec instead.
# ─────────────────────────────────────────────────────────────────────
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: runner-pool-egress
  namespace: studiozero-runner-pool
  labels:
    app.kubernetes.io/name: runner-worker
    app.kubernetes.io/component: sandbox
    app.kubernetes.io/managed-by: pipeline
  annotations:
    studio-zero.io/decision: ARCH-D9
    studio-zero.io/threat-model: "TB-4, TB-6, TB-14, §3.1"
    studio-zero.io/owner: "pipeline+shield+cipher"

spec:
  # Bind to the runner-worker pod selector. Railway's deployment labels
  # its pods via `app=runner-worker` per `project.md` service spec.
  endpointSelector:
    matchLabels:
      app: runner-worker

  # ── Default DENY all egress (Cilium semantics: an empty `egress` list
  #    on a CNP with `endpointSelector` set means "no egress allowed").
  #    Every rule below is an additive allowance. Adding a NEW rule is
  #    the ONLY way to permit a new destination — there is no implicit
  #    allow path. (ARCH-D9 closure depends on this property.)
  egress:
    # ── 1. Cluster-internal DNS (CoreDNS, UDP+TCP 53) ───────────────
    # Required so the runner can resolve api.anthropic.com etc. without
    # a public-DNS hop. CoreDNS itself is pinned to upstream providers
    # via the cluster ConfigMap — that pinning is what defeats DNS
    # cache-poisoning at the resolver level (see `egress-proxy.md`
    # §"DNS pinning"). The fqdn-match rules below pin per-destination.
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              # Only resolve the hostnames we'll actually allow egress
              # to. This is the FQDN-policy layer that backs the L7
              # allowlist below — Cilium intercepts the DNS reply and
              # only programs the eBPF map for these answers.
              - matchPattern: "api.anthropic.com"
              - matchPattern: "*.supabase.co"
              - matchPattern: "api.github.com"
              - matchPattern: "*.ingest.sentry.io"
              - matchPattern: "*.posthog.com"
              # codeload.github.com + objects.githubusercontent.com
              # are git-clone follow-ons (project.md egress table).
              - matchPattern: "codeload.github.com"
              - matchPattern: "objects.githubusercontent.com"

    # ── 2. Anthropic API (TB-4 destination — LLM gateway) ───────────
    # The runner does NOT call api.anthropic.com directly at M1+: the
    # `llm-gateway` Edge Function (Cipher Fix-2) is the only caller.
    # However the Edge Function runs in Supabase (separate egress
    # path) — this rule preserves the option for direct calls IF the
    # gateway is temporarily routed-around during incident response
    # (per `architecture/secrets-rotation-runbook.md`). Defense in
    # depth: keep the rule narrow, not blanket.
    - toFQDNs:
        - matchName: "api.anthropic.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    # ── 3. Supabase project hosts (TB-2: own DB + Realtime + Vault) ─
    # Wildcard matches `<project-ref>.supabase.co` AND
    # `<project-ref>.functions.supabase.co` for Edge Function calls
    # (mint-runner-token, refresh-runner-token, llm-gateway,
    # byok-validate, score-engine). Per project.md env-var table.
    - toFQDNs:
        - matchPattern: "*.supabase.co"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    # ── 4. GitHub App API (TB-12 — per-repo clone + status checks) ──
    # api.github.com handles the installation-token mint + per-PR
    # check-run write. codeload + objects are the git-clone CDN per
    # project.md egress table (Forge ARCH-D1 GitHub App day-one).
    - toFQDNs:
        - matchName: "api.github.com"
        - matchName: "codeload.github.com"
        - matchName: "objects.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    # ── 5. Sentry ingest (TB-14 — telemetry) ────────────────────────
    # `o<orgid>.ingest.sentry.io` shape; wildcard left-most label.
    # `sentry-redaction.ts` (Cipher) MUST be wired into the Sentry init
    # so payloads carry NO secret/PII before this egress fires.
    - toFQDNs:
        - matchPattern: "*.ingest.sentry.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

    # ── 6. PostHog ingest (TB-14 — analytics) ───────────────────────
    # us.i.posthog.com / eu.i.posthog.com / app.posthog.com — wildcard
    # covers regional ingest endpoints. tenant_id is HMAC-SHA256'd via
    # `vault.hash_salt` before egress per Cipher Fix-3b.
    - toFQDNs:
        - matchPattern: "*.posthog.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

  # ── EXPLICIT DENY BLOCK ───────────────────────────────────────────
  # Cilium evaluates `egressDeny` BEFORE the `egress` allow list, so
  # these CIDRs are hard-blocked even if a future allowlist accidentally
  # widens (e.g., if a malicious DNS reply tries to point a hostname at
  # one of these ranges). Mirrors the app-layer classifier in
  # `apps/runner/src/ssrf-guard.ts` (classifyIPv4 / classifyIPv6).
  egressDeny:
    - toCIDRSet:
        # IPv4 private ranges (RFC 1918)
        - cidr: 10.0.0.0/8
        - cidr: 172.16.0.0/12
        - cidr: 192.168.0.0/16
        # IPv4 loopback (RFC 1122)
        - cidr: 127.0.0.0/8
        # IPv4 link-local — AWS/GCP/Azure metadata service (CVE class)
        - cidr: 169.254.0.0/16
        # AWS IMDS endpoint specifically (belt-and-braces; covered by
        # the link-local /16 above but called out for grep-ability).
        - cidr: 169.254.169.254/32
        # IPv4 carrier-grade NAT (RFC 6598)
        - cidr: 100.64.0.0/10
        # IPv4 multicast + class E reserved
        - cidr: 224.0.0.0/4
        - cidr: 240.0.0.0/4
        # IPv6 unique-local (RFC 4193) — covers fd00::/8 too
        - cidr: "fc00::/7"
        # IPv6 link-local
        - cidr: "fe80::/10"
        # IPv6 loopback
        - cidr: "::1/128"
        # IPv4-mapped IPv6 private (defense vs ::ffff:10.x bypass)
        - cidr: "::ffff:10.0.0.0/104"
        - cidr: "::ffff:127.0.0.0/104"
        - cidr: "::ffff:169.254.0.0/112"
        - cidr: "::ffff:172.16.0.0/108"
        - cidr: "::ffff:192.168.0.0/112"
# ─────────────────────────────────────────────────────────────────────

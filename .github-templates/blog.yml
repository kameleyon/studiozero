name: CI — Blog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run build
      - name: Verify RSS feed exists
        run: test -f dist/rss.xml && echo "✓ rss"
      - name: Verify sitemap exists
        run: test -f dist/sitemap-index.xml && echo "✓ sitemap"
      - name: Validate frontmatter consistency
        run: |
          echo "TODO — small script to verify every post has required frontmatter (title, description, pubDate)"

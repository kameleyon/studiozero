name: CI — Native iOS / visionOS (SwiftUI)

# Two jobs:
#   - Linux/Windows: swift build + swift test against a non-Apple target (logic smoke test)
#   - macOS: xcodebuild + simulator tests + archive (the real device build)
#
# The macOS job only runs on tags or via workflow_dispatch — macOS minutes are expensive.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_archive:
        description: "Build an .xcarchive (uploads as artifact)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  swift-test-linux:
    name: Swift test (Linux — logic smoke)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - run: swift --version
      - run: swift build
      - run: swift test --parallel

  xcode-test-macos:
    name: Xcode test + build (macOS — real device target)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies
      - name: Run tests on iOS Simulator
        run: |
          xcodebuild test \
            -scheme StudioZeroApp \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build archive
        if: github.event.inputs.build_archive == 'true' || startsWith(github.ref, 'refs/tags/v')
        run: |
          xcodebuild archive \
            -scheme StudioZeroApp \
            -destination 'generic/platform=iOS' \
            -archivePath build/StudioZeroApp.xcarchive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Upload archive
        if: github.event.inputs.build_archive == 'true' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4
        with:
          name: StudioZeroApp-${{ github.sha }}.xcarchive
          path: build/StudioZeroApp.xcarchive

# To submit to TestFlight or the App Store, add a deploy job here that:
#   - Imports a code-signing identity from secrets (P8 / P12)
#   - Runs xcodebuild -exportArchive with an export options plist
#   - Uses xcrun altool or fastlane pilot to upload
# That's project-specific (signing identity, app id) — outside the template's scope.

name: Lighthouse Gate

# Drop into any web vertical alongside its main CI workflow. Pulls per-vertical
# thresholds from `lighthouserc.json` (you commit this file in the project root).
#
# Example lighthouserc.json:
#   {
#     "ci": {
#       "collect": { "startServerCommand": "npm run preview", "url": ["http://localhost:4321/"] },
#       "assert": {
#         "assertions": {
#           "categories:performance": ["error", { "minScore": 0.9 }],
#           "categories:accessibility": ["error", { "minScore": 0.95 }],
#           "categories:best-practices": ["error", { "minScore": 0.95 }],
#           "categories:seo": ["error", { "minScore": 0.95 }]
#         }
#       },
#       "upload": { "target": "temporary-public-storage" }
#     }
#   }

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npx -y @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

name: CI — Marketing Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run build
      - name: Verify sitemap exists
        run: test -f dist/sitemap-index.xml && echo "✓ sitemap"

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npx -y @lhci/cli@0.14.x autorun --upload.target=temporary-public-storage
        env:
          # Marketing-site targets are stricter than default — see checklists/web-vitals.md
          LHCI_BUILD_CONTEXT__CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}

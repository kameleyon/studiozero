# Studio Zero — Supabase project config (drop into supabase/config.toml)
# Generated by Terra. Reflects the studio defaults; tune per project.

project_id = "your-project-ref"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"
image_transformation = { enabled = true }

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://your-prod-domain.com"]
jwt_expiry = 3600
refresh_token_rotation_enabled = true
security_refresh_token_reuse_interval = 10
enable_manual_linking = false
minimum_password_length = 8
password_requirements = "letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[auth.sms]
enable_signup = false
enable_confirmations = false

# OAuth providers — uncomment and configure per project
# [auth.external.google]
# enabled = true
# client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
# secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
# redirect_uri = "https://your-project.supabase.co/auth/v1/callback"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# Functions per project — defined as files under supabase/functions/
[functions.stripe-webhook]
verify_jwt = false  # webhooks don't carry JWTs

[analytics]
enabled = false  # default off; turn on per-project if needed
port = 54327
backend = "postgres"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="56" height="56" role="img" aria-labelledby="szmd-title szmd-desc">
  <title id="szmd-title">Studio Zero director mark</title>
  <desc id="szmd-desc">Director variant: the standard concentric mark with an outer halo ring at inset -8px, reserved for BigBrain surfaces.</desc>
  <defs>
    <radialGradient id="szmd-fill" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a2a2f"/>
      <stop offset="70%" stop-color="#050506"/>
    </radialGradient>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        .halo { animation: szmd-pulse 4s ease-in-out infinite; transform-origin: 36px 36px; }
        @keyframes szmd-pulse {
          0%, 100% { stroke-opacity: 0.20; transform: scale(1.00); }
          50%      { stroke-opacity: 0.45; transform: scale(1.035); }
        }
      }
    </style>
  </defs>
  <circle class="halo" cx="36" cy="36" r="34" fill="none" stroke="#9a9aa2" stroke-width="0.75" stroke-opacity="0.20"/>
  <circle cx="36" cy="36" r="28" fill="url(#szmd-fill)" stroke="#2a2a2f" stroke-width="1"/>
  <circle cx="36" cy="36" r="15.4" fill="none" stroke="#3a3a40" stroke-width="0.75" stroke-opacity="0.65"/>
  <circle cx="36" cy="36" r="26" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>
</svg>

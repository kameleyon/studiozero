<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Zero — VR / WebXR</title>
    <style>
      html, body, #root { margin: 0; height: 100%; overflow: hidden; background: #000; color: #eee;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      canvas { display: block; }
      .enter-vr-overlay {
        position: fixed; inset: 0; display: grid; place-items: center; z-index: 10;
        background: radial-gradient(circle at center, #1a1a2e, #000);
        pointer-events: none;
      }
      .enter-vr-overlay > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

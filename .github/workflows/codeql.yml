name: CodeQL

# ──────────────────────────────────────────────────────────────────────
# Static analysis via GitHub's CodeQL — per sprint/milestone-M0.md
# "Pipeline: CodeQL + Dependabot + gitleaks v8.x with committed config
#  — PR-blocking on Critical/High" + test-strategy §1 row "Security
# (SAST + dep CVE + secret scan)".
#
# Triggers:
#   - Push / PR against main — regression on every change.
#   - Weekly cron Mon 06:00 UTC — picks up new queries / CVEs landing
#     in CodeQL packs without a code change here.
#
# Findings land in repo → Security → Code scanning alerts.
# All third-party actions SHA-pinned (motionmax B-NEW-5).
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly, Mondays 06:00 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # CodeQL v3 packs JS + TS in one language pack.
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3
        with:
          languages: ${{ matrix.language }}
          # security-extended raises coverage without the stylistic
          # noise that security-and-quality adds. Same posture as motionmax.
          queries: security-extended

      # No build step required for JS/TS — CodeQL analyses source.
      # Reinstate Autobuild here if we ever add a compiled language.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3
        with:
          category: '/language:${{ matrix.language }}'

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22" role="img" aria-labelledby="szm-title szm-desc">
  <title id="szm-title">Studio Zero mark</title>
  <desc id="szm-desc">A concentric circle mark: filled disc with a soft inner highlight at 35% 35%, and a hairline inner ring at 55% diameter.</desc>
  <defs>
    <radialGradient id="szm-fill" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a2a2f"/>
      <stop offset="70%" stop-color="#050506"/>
    </radialGradient>
  </defs>
  <circle cx="11" cy="11" r="10.5" fill="url(#szm-fill)" stroke="#2a2a2f" stroke-width="1"/>
  <circle cx="11" cy="11" r="6.05" fill="none" stroke="#3a3a40" stroke-width="0.5" stroke-opacity="0.65"/>
  <circle cx="11" cy="11" r="9.75" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>
</svg>

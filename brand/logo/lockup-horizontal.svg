<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 28" width="200" height="28" role="img" aria-labelledby="szlh-title szlh-desc">
  <title id="szlh-title">Studio Zero</title>
  <desc id="szlh-desc">Horizontal lockup: concentric mark followed by the lowercase wordmark "studio zero" in Geist.</desc>
  <defs>
    <radialGradient id="szlh-fill" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a2a2f"/>
      <stop offset="70%" stop-color="#050506"/>
    </radialGradient>
  </defs>
  <g transform="translate(3 3)">
    <circle cx="11" cy="11" r="10.5" fill="url(#szlh-fill)" stroke="#2a2a2f" stroke-width="1"/>
    <circle cx="11" cy="11" r="6.05" fill="none" stroke="#3a3a40" stroke-width="0.5" stroke-opacity="0.65"/>
    <circle cx="11" cy="11" r="9.75" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>
  </g>
  <text x="36" y="19"
        font-family="Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14" font-weight="500"
        letter-spacing="-0.14"
        fill="currentColor">studio zero</text>
</svg>
